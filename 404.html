<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Página não encontrada | E se Você Fosse</title>
  <meta name="robots" content="noindex" />
  <style>
    :root{--bg:#0a0a0f;--fg:#f5f0e8;--muted:#8a8578;--accent:#c9a227;--card:#1a1a24;--border:#2a2a36}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Georgia',serif;background:var(--bg);color:var(--fg);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    h1{font-size:8rem;font-weight:900;color:var(--accent);margin:0;line-height:1;opacity:0.3}
    h2{font-size:1.8rem;margin:16px 0 8px}
    p{color:var(--muted);font-size:1.1rem;max-width:400px;margin:0 auto 32px;line-height:1.6}
    .btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .btn{padding:12px 24px;border-radius:10px;text-decoration:none;font-weight:700;font-size:0.95rem;transition:all 0.2s}
    .btn-primary{background:var(--accent);color:#111}
    .btn-primary:hover{background:#d4a52a}
    .btn-secondary{border:1px solid var(--border);color:var(--fg)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .quote{font-style:italic;color:var(--accent);font-size:0.9rem;margin-top:40px;opacity:0.7}
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Esta história se perdeu no tempo</h2>
    <p>A página que você procura não existe ou foi movida. Mas há muitas outras jornadas esperando por você.</p>
    <div class="btns">
      <a href="/" class="btn btn-primary">← Voltar para Home</a>
      <a href="/biblioteca/" class="btn btn-secondary">Ver Biblioteca</a>
    </div>
    <p class="quote">"O passado não pode ser alterado. O futuro ainda está em suas mãos."</p>
  </div>
</body>
</html>

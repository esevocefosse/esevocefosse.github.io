<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca de Personagens | E se Você Fosse</title>
  <meta name="description" content="Portal premium de pesquisa dos personagens do canal E se Você Fosse, com filtros por época e tema." />
  <style>
    :root{--bg:#0b0b10;--bg2:#12121a;--card:#171723;--txt:#f3efe6;--muted:#a7a293;--acc:#c9a227;--line:#2a2a36}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,Arial;background:linear-gradient(180deg,var(--bg),var(--bg2));color:var(--txt)}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .hero{padding:28px;border:1px solid var(--line);background:radial-gradient(circle at 15% 0%,rgba(201,162,39,.18),transparent 35%),var(--card);border-radius:18px;margin-bottom:20px}
    h1{margin:0 0 8px;font-size:2rem} .muted{color:var(--muted)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .btn{background:var(--acc);color:#111;padding:10px 14px;border-radius:10px;text-decoration:none;font-weight:700}
    .filters{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin:16px 0 20px}
    input,select{width:100%;background:#11131a;border:1px solid var(--line);color:#fff;padding:10px;border-radius:10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card)}
    .cover{height:140px;background:#0f0f16 center/cover no-repeat;position:relative}
    .cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,.75))}
    .badge{position:absolute;left:10px;bottom:10px;z-index:2;background:rgba(201,162,39,.9);color:#111;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700}
    .content{padding:14px} .meta{font-size:12px;color:var(--muted)}
    .pager{display:flex;justify-content:center;gap:10px;align-items:center;margin:18px 0}
    .pbtn{background:#1f1f2b;border:1px solid var(--line);color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
    .pbtn:disabled{opacity:.4;cursor:not-allowed}
    @media(max-width:800px){.filters{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="top">
        <div>
          <h1>Biblioteca de Personagens</h1>
          <p class="muted">Portal de pesquisa completo por personagem, com filtros por <strong>época</strong> e <strong>tema</strong>.</p>
        </div>
        <a class="btn" href="../index.html">Voltar para Home</a>
      </div>
    </section>

    <section class="filters">
      <input id="q" placeholder="Buscar personagem..." />
      <select id="epoca"><option value="">Todas as épocas</option></select>
      <select id="tema"><option value="">Todos os temas</option></select>
    </section>

    <section id="grid" class="grid"></section>
    <div class="pager">
      <button id="prev" class="pbtn">Anterior</button>
      <span id="pageInfo" class="muted"></span>
      <button id="next" class="pbtn">Próximo</button>
    </div>
  </div>

<script>
const data = [{"slug":"adolf-hitler","nome":"Adolf Hitler","periodo":"1889–1945","epoca":"Século XX","tema":"Política e Guerra","categoria":"História Contemporânea","video":"xdrXEcrLmMo","desc":"Ditador da Alemanha nazista; figura central da Segunda Guerra e do Holocausto."},{"slug":"bruce-lee","nome":"Bruce Lee","periodo":"1940–1973","epoca":"Século XX","tema":"Cultura e Esporte","categoria":"Cultura e Esporte","video":"LZ-4Rj6i4hA","desc":"Artista marcial e ator que transformou o cinema de ação no mundo."},{"slug":"noe","nome":"Noé","periodo":"Tradição bíblica","epoca":"Antiguidade","tema":"Religião","categoria":"Religião e Tradição","video":"no8BvC0sepM","desc":"Personagem da tradição abraâmica associado à arca e ao dilúvio."},{"slug":"platao","nome":"Platão","periodo":"c. 428/427 a.C. – 348/347 a.C.","epoca":"Antiguidade","tema":"Filosofia","categoria":"Filosofia","video":"FbD4JoxwXMw","desc":"Filósofo grego, fundador da Academia e autor de diálogos clássicos."},{"slug":"madre-teresa","nome":"Madre Teresa","periodo":"1910–1997","epoca":"Século XX","tema":"Religião e Humanitarismo","categoria":"Religião e Humanitarismo","video":"XOws3yTBEqg","desc":"Missionária católica conhecida por atuação com pobres e enfermos."},{"slug":"judas-iscariotes","nome":"Judas Iscariotes","periodo":"Século I","epoca":"Antiguidade","tema":"Religião","categoria":"Religião e Tradição","video":"FdKhtdZ8YQM","desc":"Figura do Novo Testamento ligada ao episódio da traição de Jesus."},{"slug":"lampiao","nome":"Lampião (Virgulino Ferreira)","periodo":"1898–1938","epoca":"Século XX","tema":"História do Brasil","categoria":"História do Brasil","video":"NgNkZ2Qk5V8","desc":"Principal líder do cangaço e personagem marcante do sertão nordestino."},{"slug":"silvio-santos","nome":"Silvio Santos","periodo":"1930–2024","epoca":"Século XX/XXI","tema":"Mídia e Negócios","categoria":"Mídia e Negócios","video":"_sMYjFpk-ww","desc":"Apresentador e empresário, ícone da televisão brasileira."},{"slug":"roberto-bolanos","nome":"Roberto Bolaños (Chespirito)","periodo":"1929–2014","epoca":"Século XX/XXI","tema":"Cultura Pop","categoria":"Cultura Pop","video":"7yBlg5dmdeY","desc":"Criador de Chaves e Chapolin, referência do humor latino-americano."},{"slug":"ayrton-senna","nome":"Ayrton Senna","periodo":"1960–1994","epoca":"Século XX","tema":"Esporte","categoria":"Esporte","video":"NI76QVGDyDs","desc":"Tricampeão de Fórmula 1 e um dos maiores pilotos da história."},{"slug":"nikola-tesla","nome":"Nikola Tesla","periodo":"1856–1943","epoca":"Século XIX/XX","tema":"Ciência e Tecnologia","categoria":"Ciência e Tecnologia","video":"","desc":"Inventor da corrente alternada e do rádio, gênio que morreu sozinho após ser explorado pelo capitalismo."},{"slug":"napoleao-bonaparte","nome":"Napoleão Bonaparte","periodo":"1769–1821","epoca":"Século XVIII/XIX","tema":"Política e Guerra","categoria":"Política e Guerra","video":"","desc":"Imperador dos Franceses, maior estrategista militar da era moderna e criador do Código Napoleônico."},{"slug":"marie-curie","nome":"Marie Curie","periodo":"1867–1934","epoca":"Século XIX/XX","tema":"Ciência","categoria":"Ciência","video":"","desc":"Única pessoa a ganhar dois Nobel em ciências, descobridora da radioatividade, polônio e rádio."},{"slug":"marilyn-monroe","nome":"Marilyn Monroe","periodo":"1926–1962","epoca":"Século XX","tema":"Cultura Pop","categoria":"Cultura Pop","video":"iWrJsza9Ggc","desc":"Ícone do cinema americano, símbolo sexual e uma das maiores estrelas de Hollywood. Sua vida foi marcada por fama, problemas pessoais e um legado que vale bilhões após sua morte."}];const perPage = 6;
let page = 1;
let filtered = [...data];

const q = document.getElementById('q');
const epoca = document.getElementById('epoca');
const tema = document.getElementById('tema');
const grid = document.getElementById('grid');
const prev = document.getElementById('prev');
const next = document.getElementById('next');
const pageInfo = document.getElementById('pageInfo');

[...new Set(data.map(i=>i.epoca))].sort().forEach(v=>epoca.insertAdjacentHTML('beforeend', `<option>${v}</option>`));
[...new Set(data.map(i=>i.tema))].sort().forEach(v=>tema.insertAdjacentHTML('beforeend', `<option>${v}</option>`));

function apply() {
  const t = q.value.toLowerCase().trim();
  filtered = data.filter(i => {
    const okT = !t || i.nome.toLowerCase().includes(t) || i.desc.toLowerCase().includes(t);
    const okE = !epoca.value || i.epoca === epoca.value;
    const okM = !tema.value || i.tema === tema.value;
    return okT && okE && okM;
  });
  page = 1;
  render();
}

function render() {
  const totalPages = Math.max(1, Math.ceil(filtered.length / perPage));
  if (page > totalPages) page = totalPages;
  const start = (page - 1) * perPage;
  const chunk = filtered.slice(start, start + perPage);

  grid.innerHTML = chunk.map(i => `
    <article class="card">
      <div class="cover" style="background-image:url('https://img.youtube.com/vi/${i.video}/mqdefault.jpg')">
        <span class="badge">${i.tema}</span>
      </div>
      <div class="content">
        <h3>${i.nome}</h3>
        <p class="meta">${i.periodo} • ${i.categoria}</p>
        <p>${i.desc}</p>
        <a class="btn" href="./${i.slug}.html">Abrir pesquisa completa</a>
      </div>
    </article>
  `).join('');

  pageInfo.textContent = `Página ${page} de ${totalPages} • ${filtered.length} resultados`;
  prev.disabled = page === 1;
  next.disabled = page === totalPages;
}

prev.addEventListener('click', () => { page--; render(); });
next.addEventListener('click', () => { page++; render(); });
q.addEventListener('input', apply);
epoca.addEventListener('change', apply);
tema.addEventListener('change', apply);

render();
</script>
</body>
</html>
